services:
  postgres:
    image: postgres:16-alpine
    container_name: opencut-postgres
    environment:
      POSTGRES_USER: opencut
      POSTGRES_PASSWORD: opencut
      POSTGRES_DB: opencut
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencut -d opencut"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
